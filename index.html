<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Charbel Song Catalog</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#000;
padding:25px;
text-align:center;
font-size:32px;
font-weight:bold;
border-bottom:2px solid #333;
}

.subtitle{
text-align:center;
color:#aaa;
margin-top:-10px;
margin-bottom:30px;
}

.container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.song{
background:#1c1c1c;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.song:hover{
background:#262626;
transform:scale(1.03);
}

button{
background:#25D366;
border:none;
padding:12px 25px;
color:white;
font-size:16px;
cursor:pointer;
border-radius:30px;
font-weight:bold;
}

audio{
width:100%;
margin-top:10px;
}

</style>

</head>

<body oncontextmenu="return false">

<header>
🎵 Charbel Song Catalog
</header>

<p class="subtitle">
Arabic Songwriter • Lebanese Pop • Tarab • Ballads
</p>

<div class="container" id="songList"></div>

<script>

fetch("songs.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("songList");

data.songs.forEach(song => {

const html = `
<div class="song">

<h2>${song.title}</h2>

<p><b>Style:</b> ${song.style}</p>
<p><b>Mood:</b> ${song.mood}</p>
<p><b>Price:</b> ${song.price}</p>

<audio controls controlsList="nodownload" ontimeupdate="limitPreview(this)"><source src="${song.demo}" type="audio/mpeg">
</audio>

<br><br>

<a href="https://wa.me/96170333029?text=Hello I want to buy the song ${song.title}">
<button>Buy / Contact</button>
</a>

</div>
`;

container.innerHTML += html;

});

});

</script>
<script>

function limitPreview(player){

let previewLimit = 60; // seconds

if(player.currentTime > previewLimit){

player.pause();
player.currentTime = 0;

alert("Preview ended. Buy the full song to unlock the complete track.");
}

}

</script>

</body>
</html>
