<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Charbel Song Catalog</title>

<style>
.progress{
cursor:pointer;
height:6px;
background:#333;
border-radius:4px;
margin-top:5px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#25D366;
transition:width 0.2s;
}

.song.playing{
background:#2a2a2a;
}

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#000;
padding:25px;
text-align:center;
font-size:32px;
font-weight:bold;
border-bottom:2px solid #333;
}

.subtitle{
text-align:center;
color:#aaa;
margin-top:-10px;
margin-bottom:20px;
}

.searchBox{
text-align:center;
margin-bottom:20px;
}

.searchBox input,
.searchBox select{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

.container{
width:100%;
max-width:700px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
padding-bottom:80px;
}

.song{
display:flex;
align-items:center;
gap:15px;
background:#181818;
padding:12px;
border-radius:8px;
}

.song:hover{
background:#262626;
transform:scale(1.03);
}

button{
background:none;
border:none;
font-size:22px;
cursor:pointer;
}

audio{
width:100%;
margin-top:10px;
}

#lyricsModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
color:white;
padding:40px;
overflow:auto;
}

</style>

</head>

<body oncontextmenu="return false">

<header>
🎵 Charbel Song Catalog
</header>

<p class="subtitle">
Arabic Songwriter • Lebanese Pop • Tarab • Ballads
</p>

<div class="searchBox">

<input id="searchBox" placeholder="Search song...">

<select id="styleFilter">
<option value="">All Styles</option>
<option value="Tarab">Tarab</option>
<option value="Pop">Pop</option>
<option value="Chaabe">Chaabe</option>
</select>

</div>

<div class="container" id="songList"></div>

<script>

let allSongs=[];

fetch("songs.json")
.then(res=>res.json())
.then(data=>{
allSongs=data.songs;
displaySongs(allSongs);
});

function displaySongs(songs){

const container=document.getElementById("songList");
container.innerHTML="";

songs.forEach(song=>{

const cover = song.cover ? song.cover : "covers/default.jpg";

const html = `

<div class="song">

<img src="${cover}" 
style="width:60px;height:60px;border-radius:6px;object-fit:cover;">

<div style="flex:1">

<b>${song.title}</b><br>
<span style="color:#aaa">${song.style}</span>

<div class="progress" onclick="seekSong(event,this)">
<div class="progressBar"></div>
</div>


</div>

<button onclick="toggleSong('${song.demo}','${song.title}',this)">
▶
</button>


</div>

`;

container.innerHTML+=html;

});

}

document.getElementById("searchBox").addEventListener("input",filterSongs);
document.getElementById("styleFilter").addEventListener("change",filterSongs);

function filterSongs(){

let search=document.getElementById("searchBox").value.toLowerCase();
let style=document.getElementById("styleFilter").value;

let filtered=allSongs.filter(song=>{

let matchTitle=song.title.toLowerCase().includes(search);
let matchStyle=!style || song.style.includes(style);

return matchTitle && matchStyle;

});

displaySongs(filtered);

}

function limitPreview(player){

let previewLimit=60;

if(player.currentTime>previewLimit){

player.pause();
player.currentTime=0;

alert("Preview ended. Contact to buy the full song.");

}

}

</script>

<div id="lyricsModal">

<h2 id="lyricsTitle"></h2>

<p id="lyricsText"></p>

<button onclick="closeLyrics()">Close</button>

</div>

<script>

function showLyrics(title,lyrics){

document.getElementById("lyricsModal").style.display="block";
document.getElementById("lyricsTitle").innerText=title;
document.getElementById("lyricsText").innerText=lyrics || "Lyrics not available";

}

function closeLyrics(){

document.getElementById("lyricsModal").style.display="none";

}

</script>

<div id="playerBar"
style="
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:10px;
display:flex;
align-items:center;
gap:10px;
">

<div id="nowPlaying" style="flex:1">No song playing</div>

<span id="timeDisplay">0:00 / 0:00</span>

<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">

<audio id="mainPlayer" controls style="width:200px"></audio>

</div>

<script>

function toggleSong(src,title,btn){

const player = document.getElementById("mainPlayer");

const songRow = btn.closest(".song");

if(player.src.includes(src) && !player.paused){

player.pause();
btn.innerHTML = "▶";
return;

}

/* reset songs */
document.querySelectorAll(".song").forEach(song=>{
song.classList.remove("playing");

const bar = song.querySelector(".progressBar");
if(bar) bar.style.width="0%";

const b = song.querySelector("button");
if(b) b.innerHTML="▶";

});

/* activate row */
songRow.classList.add("playing");

btn.innerHTML="⏸";

player.src = src;
player.play();

document.getElementById("nowPlaying").innerText =
"Now Playing: " + title;

player.ontimeupdate = function(){

let progress = player.duration ?
(player.currentTime / player.duration)*100 : 0;

songRow.querySelector(".progressBar").style.width =
progress + "%";

updateTime();

};

}
function seekSong(event,progressElement){

const player = document.getElementById("mainPlayer");

if(!player.duration) return;

const rect = progressElement.getBoundingClientRect();

const clickX = event.clientX - rect.left;

const width = rect.width;

const percent = clickX / width;

player.currentTime = percent * player.duration;

}
function updateTime(){

const player = document.getElementById("mainPlayer");

const current = formatTime(player.currentTime);
const duration = formatTime(player.duration);

document.getElementById("timeDisplay").innerText =
current + " / " + duration;

}

function formatTime(sec){

if(!sec) return "0:00";

let m = Math.floor(sec/60);
let s = Math.floor(sec%60);

if(s<10) s="0"+s;

return m+":"+s;

}
const volumeSlider = document.getElementById("volumeSlider");

volumeSlider.addEventListener("input",()=>{
document.getElementById("mainPlayer").volume = volumeSlider.value;
});


</script>

</body>
</html>
